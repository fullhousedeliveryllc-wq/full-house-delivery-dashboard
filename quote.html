<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get a Free Quote — Full House Delivery LLC</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .quote-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 520px;
            width: 100%;
            padding: 40px 36px;
        }
        .quote-header {
            text-align: center;
            margin-bottom: 28px;
        }
        .quote-header h1 {
            font-size: 24px;
            color: #1a1a2e;
            margin-bottom: 6px;
        }
        .quote-header p {
            font-size: 13px;
            color: #888;
        }
        .quote-header .brand {
            display: inline-block;
            background: #c0392b;
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
            outline: none;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: #c0392b;
        }
        .form-group textarea { resize: vertical; }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #c0392b;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .submit-btn:hover { background: #a93226; }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .success-msg {
            text-align: center;
            padding: 40px 20px;
        }
        .success-msg .check {
            font-size: 48px;
            display: block;
            margin-bottom: 16px;
        }
        .success-msg h2 {
            color: #2e7d32;
            margin-bottom: 8px;
        }
        .success-msg p {
            color: #666;
            font-size: 14px;
        }
        .phone-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #c0392b;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
        }
        .phone-link:hover { text-decoration: underline; }
        @media (max-width: 500px) {
            .quote-card { padding: 28px 20px; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="quote-card" id="quoteForm">
        <div class="quote-header">
            <span class="brand">FULL HOUSE DELIVERY LLC</span>
            <h1>Get a Free Quote</h1>
            <p>Fill out the form below and we'll get back to you ASAP!</p>
        </div>
        <form id="publicQuoteForm">
            <div class="form-row">
                <div class="form-group">
                    <label>Your Name *</label>
                    <input type="text" id="qName" required placeholder="John Smith">
                </div>
                <div class="form-group">
                    <label>Phone Number *</label>
                    <input type="tel" id="qPhone" required placeholder="(786) 555-1234">
                </div>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="qEmail" placeholder="john@email.com">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Service Needed</label>
                    <select id="qService">
                        <option value="Moving">Moving</option>
                        <option value="Junk Removal">Junk Removal</option>
                        <option value="Furniture Delivery">Furniture Delivery</option>
                        <option value="Commercial Move">Commercial Move</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Preferred Date</label>
                    <input type="date" id="qDate">
                </div>
            </div>
            <div class="form-group">
                <label>Tell us about your project</label>
                <textarea id="qNotes" rows="3" placeholder="Moving from a 2BR apartment to a house, need help with heavy furniture..."></textarea>
            </div>
            <button type="submit" class="submit-btn">Request Free Quote</button>
        </form>
        <a href="tel:7866824048" class="phone-link">Or call us: (786) 682-4048</a>
    </div>

    <div class="quote-card" id="successCard" style="display:none;">
        <div class="success-msg">
            <span class="check">&#9989;</span>
            <h2>Quote Request Sent!</h2>
            <p>Thank you! We'll review your request and get back to you within 24 hours.</p>
            <a href="tel:7866824048" class="phone-link">Need it sooner? Call (786) 682-4048</a>
        </div>
    </div>

    <script>
    document.getElementById('publicQuoteForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var submission = {
            name: document.getElementById('qName').value.trim(),
            phone: document.getElementById('qPhone').value.trim(),
            email: document.getElementById('qEmail').value.trim(),
            service: document.getElementById('qService').value,
            date: document.getElementById('qDate').value || new Date().toISOString().slice(0, 10),
            budget: 0,
            notes: document.getElementById('qNotes').value.trim()
        };
        localStorage.setItem('fhd_quote_submission', JSON.stringify(submission));
        document.getElementById('quoteForm').style.display = 'none';
        document.getElementById('successCard').style.display = 'block';
    });
    </script>
</body>
</html>
